name: Build for Hostinger

on:
  push:
    branches:
      - main
      - master

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      ACTIONS_ALLOW_USE_UNSECURE_NODE_VERSION: true
    permissions:
      contents: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: |
          rm -f package-lock.json
          npm install

      - name: Build project
        run: npm run build

      - name: Push built files to hostinger-build branch
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./dist
          publish_branch: hostinger-build
          force_orphan: true

      - name: Trigger Hostinger Webhook
        if: success()
        run: |
          if [ -n "${{ env.WEBHOOK }}" ]; then
            curl -X POST -H "Content-Type: application/json" -d '{"ref": "refs/heads/hostinger-build"}' "${{ env.WEBHOOK }}"
            echo "Webhook triggered"
          else
            echo "No webhook configured. Please set HOSTINGER_WEBHOOK_URL in GitHub Secrets."
          fi
        env:
          WEBHOOK: ${{ secrets.HOSTINGER_WEBHOOK_URL }}
