name: Build for Hostinger

on:
  push:
    branches:
      - main
      - master

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    permissions:
      contents: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install dependencies
        run: |
          rm -f package-lock.json
          npm install

      - name: Build project
        run: npm run build

      - name: Push built files to hostinger-build branch
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./dist
          publish_branch: hostinger-build
          force_orphan: true

      - name: Trigger Hostinger Webhook
        if: success()
        run: |
          if [ -n "${{ env.WEBHOOK }}" ]; then
            # Hostinger accepts standard GitHub Webhook payloads. We fake a push event to the hostinger-build branch.
            curl -X POST -H "Content-Type: application/json" -H "X-GitHub-Event: push" -d "{\"ref\": \"refs/heads/hostinger-build\", \"repository\": { \"full_name\": \"${{ github.repository }}\" }}" "${{ env.WEBHOOK }}"
            echo "Webhook triggered to Hostinger!"
          else
            echo "======================================================================"
            echo "WARNING: HOSTINGER_WEBHOOK_URL secret is not set!"
            echo "Your GitHub webhook triggered for 'main', but Hostinger needs to"
            echo "know that 'hostinger-build' was updated."
            echo "Please add your Hostinger Auto Deploy Webhook URL as a GitHub Secret"
            echo "named HOSTINGER_WEBHOOK_URL in this repository."
            echo "======================================================================"
          fi
        env:
          WEBHOOK: ${{ secrets.HOSTINGER_WEBHOOK_URL }}
